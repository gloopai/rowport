name: Bug report
description: Report a reproducible RowPort bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove secrets from screenshots, logs, SQL, and connection details before submitting.
  - type: input
    id: version
    attributes:
      label: RowPort version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5, Windows 11, etc.
    validations:
      required: true
  - type: input
    id: database
    attributes:
      label: Database
      placeholder: MySQL 8.4, MariaDB 11, etc.
    validations:
      required: true
  - type: dropdown
    id: ssh
    attributes:
      label: SSH tunnel
      options:
        - "No"
        - "Yes"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use a minimal example if possible.
      placeholder: |
        1. Connect to ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs after removing secrets.
