name: Feature request
description: Suggest an improvement for RowPort.
title: "[Feature]: "
labels: ["feature request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or missing today?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want RowPort to support.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Connection management
        - SSH
        - Schema browser
        - Table data
        - SQL editor
        - Import/export
        - Logs
        - Packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention other tools or workflows if useful.
